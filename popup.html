<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
*{
    box-sizing:border-box;
}

:root{
    color-scheme: light dark;
    --bg: #ffffff;
    --text: #111827;
    --surface: #f3f4f6;
    --border: #d1d5db;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --secondary: #4b5563;
}

@media (prefers-color-scheme: dark){
    :root{
        --bg: #0f0f0f;
        --text: #f9fafb;
        --surface: #1b1b1b;
        --border: #2a2a2a;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --secondary: #444444;
    }
}

body[data-theme="light"]{
    --bg: #ffffff;
    --text: #111827;
    --surface: #f3f4f6;
    --border: #d1d5db;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --secondary: #4b5563;
}

body[data-theme="dark"]{
    --bg: #0f0f0f;
    --text: #f9fafb;
    --surface: #1b1b1b;
    --border: #2a2a2a;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --secondary: #444444;
}

body{
    margin:0;
    font-family: system-ui, -apple-system, Arial;
    background:var(--bg);
    color:var(--text);
    display:flex;
    flex-direction:column;
}

/* Header */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 14px;
    border-bottom:1px solid var(--border);
}

.brand{
    display:flex;
    align-items:center;
    gap:8px;
}

.brand-logo{
    width:24px;
    height:24px;
    border-radius:4px;
    object-fit:cover;
}

.title{
    font-weight:600;
    font-size:15px;
}

.settings{
    cursor:pointer;
    font-size:18px;
}

/* Chat container */

.chat{
    padding:12px;
    flex:1;
    min-height:0;
    overflow-y:auto;
}

/* Message bubble */

.message{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px;
    font-size:13px;
    line-height:1.4;
}

.message pre{
    margin:8px 0;
    padding:8px;
    border-radius:8px;
    border:1px solid var(--border);
    background:var(--bg);
    overflow:auto;
}

.message code{
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}

/* Input area */

.input-area{
    padding:10px;
    background:var(--bg);
    border-top:1px solid var(--border);
}

textarea{
    width:100%;
    min-height:3rem;
    resize:none;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--text);
    padding:8px;
    font-size:13px;
}

button{
    margin-top:6px;
    width:100%;
    background:var(--primary);
    border:none;
    padding:8px;
    border-radius:8px;
    color:#ffffff;
    cursor:pointer;
}

button:hover{
    background:var(--primary-hover);
}

/* Settings panel */

.settings-panel{
    position:absolute;
    inset:0;
    background:var(--bg);
    display:none;
    padding:14px;
}

.settings-panel.open{
    display:block;
}

.settings-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
}

.settings-head h3{
    margin:0;
}

.icon-btn{
    margin:0;
    width:auto;
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--text);
    padding:6px 10px;
}

.icon-btn:hover{
    background:var(--bg);
}

.settings-panel input,
.settings-panel select{
    width:100%;
    padding:8px;
    margin-top:6px;
    margin-bottom:12px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:8px;
    color:var(--text);
}

.save{
    background:var(--secondary);
}

</style>

</head>

<body>

<div class="header">
    <div class="brand">
        <img class="brand-logo" src="logo.png" alt="AI Coach logo">
        <div class="title">AI Coach</div>
    </div>
    <div class="settings" id="open_settings">&#9881;</div>
</div>

<div class="chat">

<div class="message">
Hello! I'm here to help you solve this USACO problem.<br><br>
Ask things like:<br>
"What&rsquo;s the main idea?"<br>
"Can I get a hint?"<br>
"How should I approach this?"
</div>

</div>

<div class="input-area">

<textarea id="question" placeholder="Ask about this problem..."></textarea>

<button id="ask">Ask</button>

</div>

<div class="settings-panel" id="settings_panel">

<div class="settings-head">
<h3>Settings</h3>
<button class="icon-btn" id="close_settings" aria-label="Close settings">Close</button>
</div>

<label>Gemini API Key</label>
<input id="gemini_key" type="password" placeholder="Enter Gemini API key">

<label>Theme</label>
<select id="theme_select">
<option value="system">System</option>
<option value="light">Light</option>
<option value="dark">Dark</option>
</select>

<button class="save" id="save_key">Save Key</button>

</div>

<script src="popup.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
	--bg:           #07111f;
	--surface:      #0d1a2d;
	--surface-2:    #132238;
	--border:       #1c2f47;
	--accent:       #06b6d4;
	--accent-hover: #0891b2;
	--accent-glow:  rgba(6, 182, 212, 0.14);
	--primary:      #0369a1;
	--primary-hover:#0284c7;
	--secondary:    #1e3a5f;
	--text:         #dde5f0;
	--text-muted:   #4d6a8a;
	--text-dim:     #2a4060;
	--code-bg:      #030c18;
	--code-text:    #7dd3fc;
	--user-bg:      #0c3058;
	--user-border:  #0369a1;
}

body[data-theme="light"] {
	--bg:           #f0f5fb;
	--surface:      #ffffff;
	--surface-2:    #e8f0f8;
	--border:       #bfcfe0;
	--accent:       #0284c7;
	--accent-hover: #0369a1;
	--accent-glow:  rgba(2, 132, 199, 0.1);
	--primary:      #0369a1;
	--primary-hover:#0284c7;
	--secondary:    #64748b;
	--text:         #0c1e30;
	--text-muted:   #64849e;
	--text-dim:     #a0b4c8;
	--code-bg:      #e2ecf5;
	--code-text:    #0369a1;
	--user-bg:      #0369a1;
	--user-border:  #0284c7;
}

@media (prefers-color-scheme: light) {
	:root {
		--bg:           #f0f5fb;
		--surface:      #ffffff;
		--surface-2:    #e8f0f8;
		--border:       #bfcfe0;
		--accent:       #0284c7;
		--accent-hover: #0369a1;
		--accent-glow:  rgba(2, 132, 199, 0.1);
		--primary:      #0369a1;
		--primary-hover:#0284c7;
		--secondary:    #64748b;
		--text:         #0c1e30;
		--text-muted:   #64849e;
		--text-dim:     #a0b4c8;
		--code-bg:      #e2ecf5;
		--code-text:    #0369a1;
		--user-bg:      #0369a1;
		--user-border:  #0284c7;
	}
}

html, body {
	width: 360px;
	height: 520px;
	overflow: hidden;
	font-family: 'DM Sans', system-ui, sans-serif;
	background: var(--bg);
	color: var(--text);
	display: flex;
	flex-direction: column;
	position: relative;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Header ── */
.header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	padding: 10px 14px;
	background: var(--surface);
	border-bottom: 1px solid var(--border);
	flex-shrink: 0;
	position: relative;
	overflow: hidden;
}

.header::after {
	content: '';
	position: absolute;
	bottom: 0;
	left: 0;
	width: 55%;
	height: 1px;
	background: linear-gradient(90deg, var(--accent) 0%, transparent 100%);
}

.brand {
	display: flex;
	align-items: center;
	gap: 8px;
}

.brand-logo {
	width: 20px;
	height: 20px;
	border-radius: 4px;
	object-fit: cover;
}

.title {
	font-family: 'JetBrains Mono', monospace;
	font-weight: 600;
	font-size: 12.5px;
	color: var(--text);
	letter-spacing: -0.02em;
}

.title::before {
	content: '> ';
	color: var(--accent);
}

.settings {
	cursor: pointer;
	width: 28px;
	height: 28px;
	display: flex;
	align-items: center;
	justify-content: center;
	border-radius: 6px;
	color: var(--text-muted);
	font-size: 15px;
	transition: color 0.15s, background 0.15s;
}

.settings:hover {
	color: var(--text);
	background: var(--surface-2);
}

/* ── Chat ── */
.chat {
	flex: 1;
	overflow-y: auto;
	padding: 12px;
	display: flex;
	flex-direction: column;
	gap: 8px;
	min-height: 0;
}

/* ── Messages ── */
.message {
	max-width: 94%;
	align-self: flex-start;
	padding: 9px 12px;
	font-size: 12.5px;
	line-height: 1.6;
	border-radius: 10px 10px 10px 2px;
	background: var(--surface);
	border: 1px solid var(--border);
	color: var(--text);
	animation: msgIn 0.16s ease-out both;
}

@keyframes msgIn {
	from { opacity: 0; transform: translateY(4px); }
	to   { opacity: 1; transform: translateY(0); }
}

.message pre {
	margin: 8px 0;
	padding: 9px 11px;
	border-radius: 6px;
	background: var(--code-bg);
	border: 1px solid var(--border);
	overflow-x: auto;
	font-size: 11px;
}

.message code {
	font-family: 'JetBrains Mono', 'Consolas', monospace;
	font-size: 11px;
	color: var(--code-text);
}

/* ── Input ── */
.input-area {
	padding: 10px 12px;
	background: var(--surface);
	border-top: 1px solid var(--border);
	flex-shrink: 0;
}

textarea {
	width: 100%;
	min-height: 50px;
	resize: none;
	background: var(--bg);
	border: 1px solid var(--border);
	border-radius: 8px;
	color: var(--text);
	padding: 8px 10px;
	font-size: 12.5px;
	font-family: 'DM Sans', system-ui, sans-serif;
	line-height: 1.5;
	outline: none;
	transition: border-color 0.15s, box-shadow 0.15s;
}

textarea:focus {
	border-color: var(--accent);
	box-shadow: 0 0 0 2px var(--accent-glow);
}

textarea::placeholder { color: var(--text-dim); }

button {
	margin-top: 7px;
	width: 100%;
	background: var(--primary);
	border: none;
	padding: 8px;
	border-radius: 7px;
	color: #ffffff;
	cursor: pointer;
	font-family: 'JetBrains Mono', monospace;
	font-weight: 600;
	font-size: 11.5px;
	letter-spacing: 0.06em;
	transition: background 0.15s, transform 0.1s;
}

button:hover { background: var(--primary-hover); }
button:active { transform: scale(0.98); }
button:disabled { opacity: 0.4; cursor: default; transform: none; }

/* ── Settings panel ── */
.settings-panel {
	position: absolute;
	inset: 0;
	background: var(--surface);
	display: none;
	flex-direction: column;
	padding: 14px 16px;
	z-index: 10;
}

.settings-panel.open {
	display: flex;
	animation: panelIn 0.18s cubic-bezier(0.22, 1, 0.36, 1) both;
}

@keyframes panelIn {
	from { opacity: 0; transform: translateX(10px); }
	to   { opacity: 1; transform: translateX(0); }
}

.settings-head {
	display: flex;
	align-items: center;
	justify-content: space-between;
	margin-bottom: 16px;
	padding-bottom: 12px;
	border-bottom: 1px solid var(--border);
}

.settings-head h3 {
	font-family: 'JetBrains Mono', monospace;
	font-size: 12.5px;
	font-weight: 600;
	color: var(--text);
	letter-spacing: -0.01em;
}

.settings-head h3::before {
	content: '# ';
	color: var(--accent);
}

.icon-btn {
	margin: 0;
	width: auto;
	background: var(--surface-2) !important;
	border: 1px solid var(--border) !important;
	color: var(--text-muted) !important;
	padding: 5px 11px !important;
	font-size: 11px !important;
	border-radius: 5px !important;
	letter-spacing: 0.04em;
}

.icon-btn:hover {
	background: var(--border) !important;
	color: var(--text) !important;
}

.settings-panel label {
	display: block;
	font-family: 'JetBrains Mono', monospace;
	font-size: 10px;
	font-weight: 600;
	text-transform: uppercase;
	letter-spacing: 0.1em;
	color: var(--text-muted);
	margin-bottom: 5px;
	margin-top: 2px;
}

.settings-panel input,
.settings-panel select {
	width: 100%;
	padding: 8px 10px;
	margin-bottom: 13px;
	background: var(--bg);
	border: 1px solid var(--border);
	border-radius: 7px;
	color: var(--text);
	font-size: 12.5px;
	font-family: 'DM Sans', system-ui, sans-serif;
	outline: none;
	-webkit-appearance: none;
	transition: border-color 0.15s, box-shadow 0.15s;
}

.settings-panel input:focus,
.settings-panel select:focus {
	border-color: var(--accent);
	box-shadow: 0 0 0 2px var(--accent-glow);
}

.settings-panel input::placeholder { color: var(--text-dim); }

.save {
	background: var(--secondary) !important;
	border: 1px solid var(--border) !important;
	color: var(--text-muted) !important;
}

.save:hover {
	background: var(--border) !important;
	color: var(--text) !important;
}
</style>
</head>

<body>

<div class="header">
	<div class="brand">
		<img class="brand-logo" src="logo.png" alt="AI Coach logo">
		<div class="title">AI Coach</div>
	</div>
	<div class="settings" id="open_settings">&#9881;</div>
</div>

<div class="chat">
<div class="message">
Hello! I'm here to help you solve this USACO problem.<br><br>
Ask things like:<br>
"What&rsquo;s the main idea?"<br>
"Can I get a hint?"<br>
"How should I approach this?"
</div>
</div>

<div class="input-area">
<textarea id="question" placeholder="Ask about this problem..."></textarea>
<button id="ask">Ask</button>
</div>

<div class="settings-panel" id="settings_panel">

<div class="settings-head">
<h3>Settings</h3>
<button class="icon-btn" id="close_settings" aria-label="Close settings">Close</button>
</div>

<label>Gemini API Key</label>
<input id="gemini_key" type="password" placeholder="Enter Gemini API key">

<label>Theme</label>
<select id="theme_select">
<option value="system">System</option>
<option value="light">Light</option>
<option value="dark">Dark</option>
</select>

<button class="save" id="save_key">Save</button>

</div>

<script src="popup.js"></script>
</body>
</html>
